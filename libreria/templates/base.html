{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>{% block title %}Mi Inventario{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

    <!-- Favicon -->
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
</head>

<body class="d-flex">

    <!-- Sidebar -->
    {% block sidebar %}
    {% include 'includes/sidebar.html' %}
    {% endblock %}

    <!-- Contenido principal -->
    <div class="main-content flex-grow-1">

        {% block navbar %}
        {% include 'includes/navbar.html' %}
        {% endblock %}

        <div class="container-fluid mt-4">
            {% block content %}{% endblock %}
        </div>

    </div>

    <!-- JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert2 (Global para todo el proyecto) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Mostrar alertas de Django automáticamente
        {% if messages %}
        {% for message in messages %}
        Swal.fire({
            title: "{% if message.tags == 'success' %}¡Éxito!{% elif message.tags == 'error' %}Error{% else %}Información{% endif %}",
            text: "{{ message }}",
            icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
            confirmButtonText: 'Aceptar',
            confirmButtonColor: '#0d6efd',
            timer: 4000
        });
        {% endfor %}
        {% endif %}
    </script>

    <!-- Bloque para scripts adicionales de cada página -->
    {% block scripts %}{% endblock %}

</body>

<script>
    // Abrir/cerrar submenus
    document.addEventListener("DOMContentLoaded", function () {
        // Seleccionar todos los toggles
        const dropdownToggles = document.querySelectorAll(".dropdown-toggle");

        // 🔥 Al cargar la página, FORZAR que TODOS estén cerrados
        dropdownToggles.forEach(toggle => {
            toggle.classList.remove("open");
            let menu = toggle.nextElementSibling;

            if (menu && menu.classList.contains("submenu")) {
                menu.style.display = "none"; // menú cerrado por defecto
            }
        });

        // 🔥 Agregar funcionalidad de abrir/cerrar
        dropdownToggles.forEach(toggle => {
            toggle.addEventListener("click", function (e) {
                e.preventDefault();

                // Cerrar cualquier otro menú que esté abierto
                dropdownToggles.forEach(otherToggle => {
                    if (otherToggle !== toggle) {
                        otherToggle.classList.remove("open");
                        let otherMenu = otherToggle.nextElementSibling;
                        if (otherMenu && otherMenu.classList.contains("submenu")) {
                            otherMenu.style.display = "none";
                        }
                    }
                });

                // Alternar el menú clicado
                toggle.classList.toggle("open");

                let submenu = toggle.nextElementSibling;

                if (submenu && submenu.classList.contains("submenu")) {
                    submenu.style.display = toggle.classList.contains("open")
                        ? "block"
                        : "none";
                }
            });
        });
    });
</script>
<script>
    // --- LÓGICA UNIFICADA PARA EL SIDEBAR ---
    document.addEventListener("DOMContentLoaded", function () {
        const toggleButton = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const body = document.body;

        toggleButton.addEventListener('click', function () {
            if (window.innerWidth < 992) {
                sidebar.classList.toggle('sidebar-open');
            } else {
                body.classList.toggle('sidebar-collapsed');
            }
        });
    });
</script>

</html>
